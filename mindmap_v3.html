<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マインドマップ v3</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

:root {
  --tb-bg:#ffffff; --tb-border:#e2e8f0; --tb-shadow:0 2px 12px rgba(0,0,0,0.08);
  --title-color:#1e293b; --sep-color:#e2e8f0;
  --btn-slate-bg:#f1f5f9; --btn-slate-fg:#475569;
  --hint-bg:rgba(0,0,0,0.06); --hint-fg:#64748b; --hint-border:rgba(0,0,0,0.07);
  --popup-bg:#ffffff; --popup-border:#e2e8f0; --popup-title:#334155;
}
body.dark {
  --tb-bg:#1a1d2e; --tb-border:#2d3154; --tb-shadow:0 2px 12px rgba(0,0,0,0.4);
  --title-color:#e2e8f0; --sep-color:#2d3154;
  --btn-slate-bg:#334155; --btn-slate-fg:#cbd5e1;
  --hint-bg:rgba(0,0,0,0.52); --hint-fg:#94a3b8; --hint-border:rgba(255,255,255,0.06);
  --popup-bg:#1e293b; --popup-border:#334155; --popup-title:#e2e8f0;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans JP','Helvetica Neue',Arial,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}

/* ── Toolbar ── */
#toolbar{
  background:var(--tb-bg);padding:7px 12px;
  display:flex;gap:5px;align-items:center;
  border-bottom:1px solid var(--tb-border);flex-shrink:0;
  box-shadow:var(--tb-shadow);transition:background .25s,border-color .25s;
  position:relative;z-index:30;flex-wrap:wrap;
}
.app-title{color:var(--title-color);font-size:14px;font-weight:700;margin-right:2px;letter-spacing:.4px;transition:color .25s;}
.sep{width:1px;height:20px;background:var(--sep-color);margin:0 2px;transition:background .25s;}
.spacer{flex:1;}

.btn{
  padding:5px 10px;border:none;border-radius:7px;cursor:pointer;
  font-size:11.5px;font-weight:500;
  transition:filter .15s,transform .1s,background .25s,color .25s,opacity .2s;
  white-space:nowrap;display:flex;align-items:center;gap:4px;line-height:1;font-family:inherit;
}
.btn:hover:not(:disabled){filter:brightness(1.12);transform:translateY(-1px);}
.btn:active:not(:disabled){transform:translateY(0);}
.btn:disabled{opacity:.28;cursor:not-allowed;}
.btn-blue  {background:#3b82f6;color:#fff;}
.btn-slate {background:var(--btn-slate-bg);color:var(--btn-slate-fg);}
.btn-red   {background:#ef4444;color:#fff;}
.btn-green {background:#10b981;color:#fff;}
.btn-amber {background:#f59e0b;color:#fff;}
.btn-purple{background:#8b5cf6;color:#fff;}
.btn-teal  {background:#0891b2;color:#fff;}
.btn-rose  {background:#e11d48;color:#fff;}

.zoom-group{display:flex;align-items:center;background:var(--btn-slate-bg);border-radius:8px;padding:2px;gap:1px;transition:background .25s;}
.btn-icon{padding:4px 7px;font-size:14px;min-width:26px;justify-content:center;border-radius:6px;background:transparent;color:var(--btn-slate-fg);}
.btn-icon:hover:not(:disabled){background:rgba(0,0,0,0.07);filter:none;transform:none;}
.zoom-pct{padding:4px 5px;font-size:11px;font-weight:600;min-width:42px;justify-content:center;border-radius:6px;background:transparent;color:var(--btn-slate-fg);font-variant-numeric:tabular-nums;}
.zoom-pct:hover:not(:disabled){background:rgba(0,0,0,0.07);filter:none;transform:none;}

/* undo/redo indicator */
#undo-stack-info{font-size:10px;color:var(--btn-slate-fg);opacity:.6;font-variant-numeric:tabular-nums;min-width:38px;text-align:center;}

/* ── Canvas ── */
#canvas-container{flex:1;position:relative;overflow:hidden;}
#canvas{display:block;cursor:default;}
#canvas.panning{cursor:grabbing;}
#canvas.dragging{cursor:grabbing;}

/* drop zone overlay */
#drop-overlay{
  display:none;position:absolute;inset:0;z-index:50;
  background:rgba(59,130,246,0.12);border:3px dashed #3b82f6;
  border-radius:12px;pointer-events:none;
  justify-content:center;align-items:center;
  font-size:22px;font-weight:700;color:#3b82f6;letter-spacing:.5px;
}
#drop-overlay.active{display:flex;}

/* ── Edit overlay ── */
#edit-overlay{display:none;position:absolute;z-index:20;}
#edit-input{
  border:2.5px solid #3b82f6;border-radius:8px;outline:none;
  font-weight:600;padding:0 12px;background:#fff;color:#111;
  width:100%;text-align:center;box-shadow:0 6px 24px rgba(0,0,0,0.22);font-family:inherit;
}

/* ── Popups base ── */
.popup{
  display:none;position:fixed;z-index:100;
  background:var(--popup-bg);border:1px solid var(--popup-border);
  border-radius:12px;padding:13px;
  box-shadow:0 8px 32px rgba(0,0,0,0.18);
  transition:background .25s,border-color .25s;
}
.popup::before{
  content:'';position:absolute;top:-6px;left:20px;
  width:12px;height:12px;background:var(--popup-bg);
  border-left:1px solid var(--popup-border);border-top:1px solid var(--popup-border);
  transform:rotate(45deg);transition:background .25s,border-color .25s;
}
.popup-title{font-size:12.5px;font-weight:700;color:var(--popup-title);margin-bottom:11px;transition:color .25s;}
.popup-label{font-size:11px;font-weight:600;color:#94a3b8;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;}

/* color popup */
#color-popup{width:196px;}
#color-swatches{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:10px;}
.swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .12s;}
.swatch:hover{transform:scale(1.2);}
.swatch.active{border-color:#1e293b;box-shadow:0 0 0 2px #fff,0 0 0 4px #1e293b;}
.popup-divider{height:1px;background:#e2e8f0;margin:8px 0;}
.custom-row{display:flex;align-items:center;gap:8px;font-size:12px;color:#475569;font-weight:500;}
#color-custom{width:28px;height:28px;border:none;border-radius:6px;cursor:pointer;padding:0;background:none;overflow:hidden;}

/* size popup */
#size-popup{width:220px;}
.size-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.size-label{font-size:11px;color:#64748b;font-weight:600;width:56px;}
#size-slider{flex:1;accent-color:#3b82f6;cursor:pointer;}
#size-value{font-size:11px;font-weight:700;color:var(--popup-title);width:28px;text-align:right;font-variant-numeric:tabular-nums;}
.size-presets{display:flex;gap:5px;margin-top:4px;}
.size-preset{flex:1;padding:5px 0;font-size:11px;font-weight:600;border:1.5px solid var(--popup-border);border-radius:6px;background:var(--btn-slate-bg);color:var(--btn-slate-fg);cursor:pointer;text-align:center;transition:all .12s;font-family:inherit;}
.size-preset:hover{border-color:#3b82f6;color:#3b82f6;}

/* note popup */
#note-popup{width:290px;}
.note-popup-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.note-tabs{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;}
.note-tab{padding:4px 10px;font-size:11px;font-weight:600;border-radius:6px;border:1.5px solid var(--popup-border);background:var(--btn-slate-bg);color:var(--btn-slate-fg);cursor:pointer;white-space:nowrap;transition:all .12s;font-family:inherit;}
.note-tab.active{border-color:#f59e0b;background:#fffbeb;color:#b45309;}
.note-tab-add{padding:4px 8px;font-size:13px;font-weight:700;border-radius:6px;border:1.5px dashed #cbd5e1;background:transparent;color:#94a3b8;cursor:pointer;transition:all .12s;line-height:1;font-family:inherit;}
.note-tab-add:hover{border-color:#f59e0b;color:#f59e0b;}
#note-textarea{width:100%;border:1.5px solid var(--popup-border);border-radius:8px;padding:8px 10px;font-size:12.5px;font-family:inherit;resize:vertical;outline:none;color:var(--popup-title);min-height:80px;margin-bottom:10px;line-height:1.55;background:transparent;}
#note-textarea:focus{border-color:#f59e0b;}
.note-actions{display:flex;align-items:center;gap:6px;}
.note-hint{font-size:10.5px;color:#94a3b8;margin-top:7px;}

/* image popup */
#img-popup{width:240px;}
.img-drop-area{
  border:2px dashed var(--popup-border);border-radius:9px;padding:18px 10px;
  text-align:center;cursor:pointer;transition:all .15s;margin-bottom:10px;
  color:#94a3b8;font-size:12px;line-height:1.7;
}
.img-drop-area:hover,.img-drop-area.dragover{border-color:#3b82f6;color:#3b82f6;background:rgba(59,130,246,0.04);}
.img-drop-area .icon{font-size:26px;display:block;margin-bottom:4px;}
#img-file-input{display:none;}
.img-size-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.img-size-label{font-size:11px;color:#64748b;font-weight:600;width:48px;}
#img-size-slider{flex:1;accent-color:#3b82f6;cursor:pointer;}
#img-size-value{font-size:11px;font-weight:700;color:var(--popup-title);width:36px;text-align:right;font-variant-numeric:tabular-nums;}

/* edge menu */
#edge-menu{
  display:none;position:fixed;z-index:200;
  background:var(--popup-bg);border:1px solid var(--popup-border);
  border-radius:10px;padding:6px;
  box-shadow:0 8px 28px rgba(0,0,0,0.18);min-width:160px;transition:background .25s,border-color .25s;
}
.edge-menu-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--popup-title);transition:background .12s;font-family:inherit;}
.edge-menu-item:hover{background:rgba(59,130,246,0.09);}

/* image resize handles */
/* (drawn on canvas) */

/* hint */
#hint{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  background:var(--hint-bg);color:var(--hint-fg);
  padding:5px 14px;border-radius:20px;font-size:10.5px;
  pointer-events:none;white-space:nowrap;
  border:1px solid var(--hint-border);
  transition:background .25s,color .25s,border-color .25s;
}

/* toast */
#toast{
  position:absolute;bottom:48px;left:50%;transform:translateX(-50%);
  background:#1e293b;color:#fff;padding:7px 18px;border-radius:20px;
  font-size:12px;font-weight:500;pointer-events:none;
  opacity:0;transition:opacity .25s;white-space:nowrap;z-index:500;
}
#toast.show{opacity:1;}
</style>
</head>
<body>

<div id="toolbar">
  <span class="app-title">🧠 マインドマップ v3</span>
  <div class="sep"></div>

  <!-- undo/redo -->
  <button class="btn btn-slate" id="btn-undo" disabled title="元に戻す (Ctrl+Z)">↩ 元に戻す</button>
  <button class="btn btn-slate" id="btn-redo" disabled title="やり直し (Ctrl+Y)">↪ やり直し</button>
  <span id="undo-stack-info">0/0</span>

  <div class="sep"></div>
  <button class="btn btn-blue"   id="btn-add"       disabled>＋ 子ノード</button>
  <button class="btn btn-purple" id="btn-add-root"          >⊕ ルート追加</button>
  <button class="btn btn-slate"  id="btn-edit"      disabled>✏ 名前を変更</button>
  <button class="btn btn-slate"  id="btn-color"     disabled>🎨 カラー</button>
  <button class="btn btn-slate"  id="btn-size"      disabled>⬡ サイズ</button>
  <button class="btn btn-amber"  id="btn-note"      disabled>💬 注釈</button>
  <button class="btn btn-teal"   id="btn-img"       disabled>🖼 画像</button>
  <button class="btn btn-red"    id="btn-delete"    disabled title="削除（子ノードは親に繋ぎ直す）&#10;Shift+クリック: サブツリーごと削除">🗑 削除</button>

  <div class="sep"></div>
  <button class="btn btn-slate"  id="btn-reset">↺ リセット</button>

  <div class="spacer"></div>

  <div class="zoom-group">
    <button class="btn btn-icon" id="btn-zoom-out">－</button>
    <button class="btn zoom-pct" id="btn-zoom-reset">100%</button>
    <button class="btn btn-icon" id="btn-zoom-in">＋</button>
  </div>
  <div class="sep"></div>
  <button class="btn btn-slate"  id="btn-theme">🌙 ダークモード</button>

  <!-- save/load -->
  <button class="btn btn-green"  id="btn-save-json">💾 保存</button>
  <button class="btn btn-slate"  id="btn-load-json">📂 読み込み</button>
  <input type="file" id="json-file-input" accept=".json" style="display:none">
  <button class="btn btn-green"  id="btn-export">🖼 PNG出力</button>
</div>

<!-- color popup -->
<div class="popup" id="color-popup">
  <div class="popup-label">ノードカラー</div>
  <div id="color-swatches"></div>
  <div class="popup-divider"></div>
  <div class="custom-row"><span>カスタム</span><input type="color" id="color-custom" value="#3b82f6"/></div>
</div>

<!-- size popup -->
<div class="popup" id="size-popup">
  <div class="popup-title">⬡ ノードサイズ</div>
  <div class="size-row">
    <span class="size-label">スケール</span>
    <input type="range" id="size-slider" min="50" max="200" value="100" step="5"/>
    <span id="size-value">100%</span>
  </div>
  <div class="size-presets">
    <button class="size-preset" data-scale="70">小</button>
    <button class="size-preset" data-scale="100">標準</button>
    <button class="size-preset" data-scale="140">大</button>
    <button class="size-preset" data-scale="180">特大</button>
  </div>
</div>

<!-- note popup -->
<div class="popup" id="note-popup">
  <div class="note-popup-header"><span class="popup-title" style="margin:0">💬 注釈を編集</span></div>
  <div class="note-tabs" id="note-tabs"></div>
  <textarea id="note-textarea" placeholder="ノードの注釈を入力…"></textarea>
  <div class="note-actions">
    <button class="btn btn-red"   id="note-delete-tab">🗑 削除</button>
    <div class="spacer"></div>
    <button class="btn btn-slate" id="note-cancel">キャンセル</button>
    <button class="btn btn-blue"  id="note-save">保存</button>
  </div>
  <div class="note-hint">Ctrl+Enter で保存 · Esc でキャンセル</div>
</div>

<!-- image popup -->
<div class="popup" id="img-popup">
  <div class="popup-title">🖼 画像を追加</div>
  <div class="img-drop-area" id="img-drop-area">
    <span class="icon">📁</span>
    クリックまたはドロップで<br>画像を選択
  </div>
  <input type="file" id="img-file-input" accept="image/*">
  <div class="img-size-row">
    <span class="img-size-label">サイズ</span>
    <input type="range" id="img-size-slider" min="40" max="400" value="160" step="10"/>
    <span id="img-size-value">160px</span>
  </div>
  <div style="display:flex;gap:6px;">
    <button class="btn btn-slate" id="img-cancel" style="flex:1">キャンセル</button>
    <button class="btn btn-blue"  id="img-place"  style="flex:1" disabled>配置</button>
  </div>
</div>

<!-- edge context menu -->
<div id="edge-menu">
  <div class="edge-menu-item" id="edge-insert"><span>⊕</span><span>この線にノードを挿入</span></div>
</div>

<div id="canvas-container">
  <canvas id="canvas"></canvas>
  <div id="edit-overlay"><input id="edit-input" type="text" placeholder="テキストを入力…"/></div>
  <div id="drop-overlay">🖼 ここにドロップして画像を配置</div>
  <div id="hint">線をクリック: ノード挿入 · ダブルクリック: 編集 · Delete: 削除（子を繋ぎ直し） · Shift+Delete: サブツリーごと削除 · Ctrl+Z: 元に戻す</div>
  <div id="toast"></div>
</div>

<script>
(function(){
'use strict';

/* ════ DOM ════ */
const canvas    = document.getElementById('canvas');
const ctx       = canvas.getContext('2d');
const container = document.getElementById('canvas-container');
const overlay   = document.getElementById('edit-overlay');
const editInput = document.getElementById('edit-input');
const colorPopup= document.getElementById('color-popup');
const colorCustom=document.getElementById('color-custom');
const sizePopup = document.getElementById('size-popup');
const sizeSlider= document.getElementById('size-slider');
const sizeValEl = document.getElementById('size-value');
const notePopup = document.getElementById('note-popup');
const noteTA    = document.getElementById('note-textarea');
const noteTabs  = document.getElementById('note-tabs');
const imgPopup  = document.getElementById('img-popup');
const imgDrop   = document.getElementById('img-drop-area');
const imgFileIn = document.getElementById('img-file-input');
const imgSlider = document.getElementById('img-size-slider');
const imgSizeVal= document.getElementById('img-size-value');
const edgeMenu  = document.getElementById('edge-menu');
const zoomBtn   = document.getElementById('btn-zoom-reset');
const dropOverlay=document.getElementById('drop-overlay');
const toast     = document.getElementById('toast');
const undoInfo  = document.getElementById('undo-stack-info');

/* ════ Theme ════ */
let darkMode=false;
const THEME={
  light:{canvasBg:'#f5f7fb',dotColor:'rgba(0,0,0,0.055)',shadowColor:'rgba(0,0,0,0.15)',selRing:'rgba(0,0,0,0.75)',bubbleBg:'#ffffff',bubbleBd:'#cbd5e1',bubbleTxt:'#334155',bubbleHandleBg:'rgba(245,158,11,0.18)',bubbleHandleBd:'#f59e0b',edgeHover:'rgba(59,130,246,0.5)',imgSelColor:'#3b82f6'},
  dark:{canvasBg:'#0f1117',dotColor:'rgba(255,255,255,0.04)',shadowColor:'rgba(0,0,0,0.45)',selRing:'rgba(255,255,255,0.9)',bubbleBg:'#1e293b',bubbleBd:'#334155',bubbleTxt:'#e2e8f0',bubbleHandleBg:'rgba(245,158,11,0.25)',bubbleHandleBd:'#fbbf24',edgeHover:'rgba(96,165,250,0.6)',imgSelColor:'#60a5fa'}
};
const theme=()=>darkMode?THEME.dark:THEME.light;
function applyTheme(){document.body.classList.toggle('dark',darkMode);document.getElementById('btn-theme').textContent=darkMode?'☀️ ライトモード':'🌙 ダークモード';render();}

/* ════ Palette ════ */
const BRANCH_COLORS=['#f97316','#10b981','#8b5cf6','#ef4444','#06b6d4','#f59e0b','#ec4899','#84cc16'];
const SWATCHES=['#ef4444','#f97316','#f59e0b','#84cc16','#22c55e','#10b981','#06b6d4','#3b82f6','#6366f1','#8b5cf6','#ec4899','#64748b'];
const ROOT_COLORS=['#3b82f6','#8b5cf6','#10b981','#f97316','#ef4444','#06b6d4'];
const swatchCont=document.getElementById('color-swatches');
SWATCHES.forEach(hex=>{
  const d=document.createElement('div');
  d.className='swatch';d.style.background=hex;d.dataset.color=hex;
  d.addEventListener('click',()=>{changeNodeColor(hex);closeColorPopup();});
  swatchCont.appendChild(d);
});
function updateSwatchActive(c){document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('active',s.dataset.color===c));colorCustom.value=/^#[0-9a-f]{6}$/i.test(c)?c:'#3b82f6';}

/* ════ State ════ */
let nodes   = [];   // mind-map nodes
let images  = [];   // free-placed images: {id,src,imgEl,x,y,w,h}
let selId   = null; // selected node id
let selImgId= null; // selected image id
let dragNode= null, dragOff={x:0,y:0};
let editId  = null;
let counter = 0;
let noteCounter=0;
let imgCounter=0;
let hoveredEdge=null;
let pendingEdge=null;
let dragBubbleNode=null,dragBubbleNoteId=null;
// image drag/resize
let dragImg=null,dragImgOff={x:0,y:0};
let resizeImg=null,resizeImgStart={};
// pending image to place
let pendingImgSrc=null, pendingImgEl=null;
let currentNoteNodeId=null,currentNoteTabIdx=0;

/* ════ Undo / Redo ════ */
const MAX_HISTORY=80;
let history=[], histIdx=-1;

function snapshot(){
  // Serialize: nodes (strip imgEl refs) + image list (store src+dims)
  const snap=JSON.stringify({
    nodes: nodes.map(n=>({...n})),
    images: images.map(im=>({id:im.id,src:im.src,x:im.x,y:im.y,w:im.w,h:im.h})),
    counter, noteCounter, imgCounter
  });
  // truncate forward history
  history=history.slice(0,histIdx+1);
  history.push(snap);
  if(history.length>MAX_HISTORY) history.shift();
  histIdx=history.length-1;
  updateUndoButtons();
}

function restoreSnap(snap){
  const data=JSON.parse(snap);
  nodes=data.nodes;
  counter=data.counter; noteCounter=data.noteCounter; imgCounter=data.imgCounter;
  // restore images (rebuild imgEl)
  images=data.images.map(im=>{
    const existing=images.find(x=>x.src===im.src&&x.id===im.id);
    if(existing) return {...im,imgEl:existing.imgEl};
    const el=new Image(); el.src=im.src;
    return {...im,imgEl:el};
  });
  selId=null; selImgId=null;
  updateButtons(); render();
}

function undo(){if(histIdx<=0)return;histIdx--;restoreSnap(history[histIdx]);updateUndoButtons();}
function redo(){if(histIdx>=history.length-1)return;histIdx++;restoreSnap(history[histIdx]);updateUndoButtons();}

function updateUndoButtons(){
  document.getElementById('btn-undo').disabled=histIdx<=0;
  document.getElementById('btn-redo').disabled=histIdx>=history.length-1;
  undoInfo.textContent=`${histIdx}/${history.length-1}`;
}

/* ════ Zoom / pan ════ */
let zoom=1,panX=0,panY=0;
let panning=false,panStart={x:0,y:0};
const s2c=(sx,sy)=>({x:(sx-panX)/zoom,y:(sy-panY)/zoom});
const c2s=(cx,cy)=>({x:cx*zoom+panX,y:cy*zoom+panY});
function setZoom(nz,cx,cy){if(cx==null){cx=canvas.width/2;cy=canvas.height/2;}nz=Math.max(0.1,Math.min(5,nz));const f=nz/zoom;panX=cx-(cx-panX)*f;panY=cy-(cy-panY)*f;zoom=nz;zoomBtn.textContent=Math.round(zoom*100)+'%';render();}
function resetZoom(){zoom=1;panX=0;panY=0;zoomBtn.textContent='100%';render();}

/* ════ Node helpers ════ */
function uid(){return++counter;}
function makeNode(x,y,text,parentId){
  const parent=parentId!=null?nodes.find(n=>n.id===parentId):null;
  const isRoot=parentId==null;
  let branchColor;
  if(isRoot){branchColor=ROOT_COLORS[nodes.filter(n=>n.isRoot).length%ROOT_COLORS.length];}
  else if(parent&&parent.isRoot){branchColor=BRANCH_COLORS[nodes.filter(n=>n.parentId===parentId).length%BRANCH_COLORS.length];}
  else{branchColor=parent?parent.branchColor:'#3b82f6';}
  return{id:uid(),x,y,text,parentId,isRoot,branchColor,notes:[],scale:100,noteOffsets:[]};
}

function nodeSize(node){
  const sc=(node.scale||100)/100;
  ctx.font=`${node.isRoot?'bold ':''}${Math.round((node.isRoot?15:13)*sc)}px "Noto Sans JP","Helvetica Neue",Arial,sans-serif`;
  const tw=ctx.measureText(node.text).width;
  const px=(node.isRoot?26:20)*sc;
  return{w:Math.max(tw+px*2,(node.isRoot?130:90)*sc),h:(node.isRoot?48:36)*sc,sc};
}
function hitNode(node,cx,cy){const{w,h}=nodeSize(node);return cx>=node.x-w/2&&cx<=node.x+w/2&&cy>=node.y-h/2&&cy<=node.y+h/2;}
function nodeAt(cx,cy){for(let i=nodes.length-1;i>=0;i--)if(hitNode(nodes[i],cx,cy))return nodes[i];return null;}

/* ════ Image helpers ════ */
function imageAt(cx,cy){
  for(let i=images.length-1;i>=0;i--){
    const im=images[i];
    if(cx>=im.x&&cx<=im.x+im.w&&cy>=im.y&&cy<=im.y+im.h) return im;
  }
  return null;
}
const IMG_HANDLE=10;
function imageResizeHandle(im,cx,cy){
  // bottom-right corner
  const hx=im.x+im.w, hy=im.y+im.h;
  return Math.abs(cx-hx)<=IMG_HANDLE&&Math.abs(cy-hy)<=IMG_HANDLE;
}

/* ════ Edge detection ════ */
function distPointToBezier(px,py,x0,y0,cx1,cy1,cx2,cy2,x3,y3,steps=30){
  let minD=Infinity;
  for(let i=0;i<=steps;i++){const t=i/steps,mt=1-t;const bx=mt*mt*mt*x0+3*mt*mt*t*cx1+3*mt*t*t*cx2+t*t*t*x3;const by=mt*mt*mt*y0+3*mt*mt*t*cy1+3*mt*t*t*cy2+t*t*t*y3;const d=Math.sqrt((px-bx)**2+(py-by)**2);if(d<minD)minD=d;}
  return minD;
}
function edgeAt(cx,cy,threshold=8){
  for(const node of nodes){
    if(node.parentId==null)continue;
    const par=nodes.find(n=>n.id===node.parentId);if(!par)continue;
    const dx=node.x-par.x;
    const d=distPointToBezier(cx,cy,par.x,par.y,par.x+dx*0.5,par.y,node.x-dx*0.5,node.y,node.x,node.y);
    if(d<threshold)return{from:par,to:node};
  }
  return null;
}

/* ════ Bubble helpers ════ */
const B_MAX_W=170,B_PAD=9,B_FS=11,B_LH=16;
function wrapText(text,maxW){
  ctx.font=`${B_FS}px "Noto Sans JP","Helvetica Neue",Arial,sans-serif`;
  const result=[];
  for(const para of text.split('\n')){
    let line='';
    for(const ch of para){const test=line+ch;if(ctx.measureText(test).width>maxW&&line){result.push(line);line=ch;}else{line=test;}}
    result.push(line);
  }
  return result.length?result:[''];
}
function getNoteOffset(node,noteId){
  const ex=(node.noteOffsets||[]).find(o=>o.noteId===noteId);if(ex)return ex;
  const idx=(node.notes||[]).findIndex(n=>n.id===noteId);
  const total=(node.notes||[]).length;
  const angle=-Math.PI/2+(total>1?(Math.PI*2/total)*idx:0);
  return{noteId,angle,dist:90};
}
function saveNoteOffset(node,noteId,angle,dist){
  if(!node.noteOffsets)node.noteOffsets=[];
  const idx=node.noteOffsets.findIndex(o=>o.noteId===noteId);
  if(idx>=0)node.noteOffsets[idx]={noteId,angle,dist};else node.noteOffsets.push({noteId,angle,dist});
}
function bubblePos(node,noteId){
  const off=getNoteOffset(node,noteId);
  return{bx:node.x+Math.cos(off.angle)*off.dist,by:node.y+Math.sin(off.angle)*off.dist,angle:off.angle};
}
function bubbleBounds(node,noteObj){
  if(!noteObj||!noteObj.text)return null;
  const lines=wrapText(noteObj.text,B_MAX_W-B_PAD*2);
  ctx.font=`${B_FS}px "Noto Sans JP","Helvetica Neue",Arial,sans-serif`;
  const maxLW=Math.max(...lines.map(l=>ctx.measureText(l).width));
  const bw=Math.max(60,Math.min(B_MAX_W,maxLW+B_PAD*2));
  const bh=lines.length*B_LH+B_PAD*2;
  const{bx,by}=bubblePos(node,noteObj.id);
  return{x:bx-bw/2,y:by-bh/2,w:bw,h:bh,lines,cx:bx,cy:by};
}
function bubbleAt(cx,cy){
  for(let i=nodes.length-1;i>=0;i--){const node=nodes[i];for(const no of(node.notes||[])){const bb=bubbleBounds(node,no);if(bb&&cx>=bb.x&&cx<=bb.x+bb.w&&cy>=bb.y&&cy<=bb.y+bb.h)return{node,noteId:no.id};}}
  return null;
}
function bubbleHandleAt(cx,cy){
  for(let i=nodes.length-1;i>=0;i--){const node=nodes[i];if(node.id!==selId)continue;for(const no of(node.notes||[])){if(!no.text)continue;const{bx,by}=bubblePos(node,no.id);if(Math.hypot(cx-bx,cy-by)<=9)return{node,noteId:no.id};}}
  return null;
}

/* ════ Drawing ════ */
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}

function drawConnection(from,to,isHovered){
  const dx=to.x-from.x;
  const t=theme();
  ctx.save();
  if(isHovered){
    ctx.strokeStyle=t.edgeHover;ctx.lineWidth=7;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(from.x,from.y);ctx.bezierCurveTo(from.x+dx*0.5,from.y,to.x-dx*0.5,to.y,to.x,to.y);ctx.stroke();
    // mid plus
    const mx=(from.x+to.x)/2+(dx>0?0:0),my=(from.y+to.y)/2;
    ctx.beginPath();ctx.arc(mx,my,10,0,Math.PI*2);ctx.fillStyle='#3b82f6';ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(mx-5,my);ctx.lineTo(mx+5,my);ctx.stroke();
    ctx.beginPath();ctx.moveTo(mx,my-5);ctx.lineTo(mx,my+5);ctx.stroke();
  }
  ctx.strokeStyle=to.branchColor+'aa';ctx.lineWidth=2.5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(from.x,from.y);ctx.bezierCurveTo(from.x+dx*0.5,from.y,to.x-dx*0.5,to.y,to.x,to.y);ctx.stroke();
  ctx.restore();
}

function drawNode(node){
  const{w,h,sc}=nodeSize(node);
  const x=node.x-w/2,y=node.y-h/2,r=(node.isRoot?13:9)*sc;
  const isSel=node.id===selId,color=node.branchColor,t=theme();
  ctx.save();
  ctx.shadowColor=isSel?color+'bb':t.shadowColor;ctx.shadowBlur=isSel?22:10;ctx.shadowOffsetY=3;
  roundRect(x,y,w,h,r);ctx.fillStyle=color;ctx.fill();
  ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetY=0;
  if(isSel){roundRect(x-3,y-3,w+6,h+6,r+3);ctx.strokeStyle=t.selRing;ctx.lineWidth=2.5;ctx.stroke();}
  if(node.isRoot){roundRect(x-3,y-3,w+6,h+6,r+3);ctx.strokeStyle=color+'55';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.stroke();ctx.setLineDash([]);}
  const grad=ctx.createLinearGradient(x,y,x,y+h);grad.addColorStop(0,'rgba(255,255,255,0.22)');grad.addColorStop(1,'rgba(0,0,0,0)');roundRect(x,y,w,h,r);ctx.fillStyle=grad;ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.95)';ctx.font=`${node.isRoot?'bold ':''}${Math.round((node.isRoot?15:13)*sc)}px "Noto Sans JP","Helvetica Neue",Arial,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(node.text,node.x,node.y);
  // note badge
  const nc=(node.notes||[]).filter(n=>n.text).length;
  if(nc>0){const bx=node.x+w/2-6,by=node.y-h/2+6;ctx.beginPath();ctx.arc(bx,by,9,0,Math.PI*2);ctx.fillStyle='#f59e0b';ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 9px "Noto Sans JP",Arial,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(nc>9?'9+':String(nc),bx,by);}
  ctx.restore();
}

function drawBubble(node,noteObj){
  const bb=bubbleBounds(node,noteObj);if(!bb)return;
  const{x,y,w,h,lines,cx,cy}=bb,t=theme(),isSel=node.id===selId;
  const{bx,by,angle}=bubblePos(node,noteObj.id);
  const{w:nw,h:nh}=nodeSize(node);
  const edgeX=node.x+Math.cos(angle)*nw/2,edgeY=node.y+Math.sin(angle)*nh/2;
  ctx.save();
  ctx.strokeStyle=isSel?'#f59e0b':t.bubbleBd;ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(edgeX,edgeY);ctx.lineTo(cx,cy);ctx.stroke();ctx.setLineDash([]);
  ctx.shadowColor='rgba(0,0,0,0.12)';ctx.shadowBlur=10;ctx.shadowOffsetY=3;
  roundRect(x,y,w,h,8);ctx.fillStyle=t.bubbleBg;ctx.fill();ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetY=0;
  ctx.strokeStyle=isSel?'#f59e0b':t.bubbleBd;ctx.lineWidth=isSel?1.8:1.2;ctx.stroke();
  ctx.fillStyle=t.bubbleTxt;ctx.font=`${B_FS}px "Noto Sans JP","Helvetica Neue",Arial,sans-serif`;ctx.textAlign='left';ctx.textBaseline='top';
  lines.forEach((l,i)=>ctx.fillText(l,x+B_PAD,y+B_PAD+i*B_LH));
  if(isSel){const hR=7;ctx.beginPath();ctx.arc(cx,cy,hR,0,Math.PI*2);ctx.fillStyle=t.bubbleHandleBg;ctx.fill();ctx.strokeStyle=t.bubbleHandleBd;ctx.lineWidth=1.5;ctx.stroke();ctx.beginPath();ctx.moveTo(cx-4,cy);ctx.lineTo(cx+4,cy);ctx.stroke();ctx.beginPath();ctx.moveTo(cx,cy-4);ctx.lineTo(cx,cy+4);ctx.stroke();}
  ctx.restore();
}

function drawImage(im){
  const isSel=im.id===selImgId,t=theme();
  ctx.save();
  if(im.imgEl.complete&&im.imgEl.naturalWidth>0){
    ctx.drawImage(im.imgEl,im.x,im.y,im.w,im.h);
  } else {
    // placeholder
    ctx.fillStyle='#e2e8f0';roundRect(im.x,im.y,im.w,im.h,6);ctx.fill();
    ctx.fillStyle='#94a3b8';ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🖼',im.x+im.w/2,im.y+im.h/2);
  }
  if(isSel){
    roundRect(im.x-2,im.y-2,im.w+4,im.h+4,8);ctx.strokeStyle=t.imgSelColor;ctx.lineWidth=2;ctx.stroke();
    // resize handle (bottom-right)
    const hx=im.x+im.w,hy=im.y+im.h;
    ctx.fillStyle=t.imgSelColor;ctx.beginPath();ctx.arc(hx,hy,IMG_HANDLE,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.moveTo(hx-4,hy-1);ctx.lineTo(hx+1,hy-1);ctx.lineTo(hx+1,hy+4);ctx.stroke();
  }
  ctx.restore();
}

function render(){
  const t=theme();
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle=t.canvasBg;ctx.fillRect(0,0,canvas.width,canvas.height);
  // dot grid
  const step=36*zoom,ox=((panX%step)+step)%step,oy=((panY%step)+step)%step;
  ctx.fillStyle=t.dotColor;
  for(let gx=ox;gx<canvas.width;gx+=step)for(let gy=oy;gy<canvas.height;gy+=step){ctx.beginPath();ctx.arc(gx,gy,1,0,Math.PI*2);ctx.fill();}
  ctx.save();ctx.translate(panX,panY);ctx.scale(zoom,zoom);
  // images below nodes
  for(const im of images)drawImage(im);
  // edges
  for(const node of nodes){if(node.parentId!=null){const par=nodes.find(n=>n.id===node.parentId);if(!par)continue;const isHov=hoveredEdge&&hoveredEdge.from.id===par.id&&hoveredEdge.to.id===node.id;drawConnection(par,node,isHov);}}
  for(const node of nodes)drawNode(node);
  for(const node of nodes)for(const no of(node.notes||[]))if(no.text)drawBubble(node,no);
  ctx.restore();
}

let notePopupOpen=false;
function rebuildNoteTabs(node){
  noteTabs.innerHTML='';
  (node.notes||[]).forEach((no,i)=>{
    const btn=document.createElement('button');btn.className='note-tab'+(i===currentNoteTabIdx?' active':'');btn.textContent='注釈 '+(i+1);
    btn.addEventListener('click',()=>{saveCurrentNoteTab(node);currentNoteTabIdx=i;rebuildNoteTabs(node);noteTA.value=node.notes[i].text||'';noteTA.focus();});
    noteTabs.appendChild(btn);
  });
  const addBtn=document.createElement('button');addBtn.className='note-tab-add';addBtn.textContent='+';addBtn.title='注釈を追加';
  addBtn.addEventListener('click',()=>{saveCurrentNoteTab(node);const newNote={id:++noteCounter,text:''};node.notes.push(newNote);currentNoteTabIdx=node.notes.length-1;rebuildNoteTabs(node);noteTA.value='';noteTA.focus();});
  noteTabs.appendChild(addBtn);
}
function saveCurrentNoteTab(node){if(!node||!node.notes[currentNoteTabIdx])return;node.notes[currentNoteTabIdx].text=noteTA.value;}
function openNotePopup(){
  const btn=document.getElementById('btn-note'),rect=btn.getBoundingClientRect();
  notePopup.style.left=rect.left+'px';notePopup.style.top=(rect.bottom+8)+'px';notePopup.style.display='block';notePopupOpen=true;
  const node=nodes.find(n=>n.id===selId);if(!node)return;
  currentNoteNodeId=node.id;if(!node.notes)node.notes=[];
  if(node.notes.length===0)node.notes.push({id:++noteCounter,text:''});
  if(currentNoteTabIdx>=node.notes.length)currentNoteTabIdx=0;
  rebuildNoteTabs(node);noteTA.value=node.notes[currentNoteTabIdx].text||'';
  requestAnimationFrame(()=>{noteTA.focus();noteTA.setSelectionRange(noteTA.value.length,noteTA.value.length);});
}
function closeNotePopup(){notePopup.style.display='none';notePopupOpen=false;}
function toggleNotePopup(){notePopupOpen?closeNotePopup():openNotePopup();}
function saveNote(){const node=nodes.find(n=>n.id===selId);if(!node)return;saveCurrentNoteTab(node);closeNotePopup();snapshot();render();}
function deleteCurrentNoteTab(){
  const node=nodes.find(n=>n.id===selId);if(!node||!node.notes)return;
  if(node.notes.length===0){closeNotePopup();return;}
  const id=node.notes[currentNoteTabIdx]?.id;
  if(node.noteOffsets)node.noteOffsets=node.noteOffsets.filter(o=>o.noteId!==id);
  node.notes.splice(currentNoteTabIdx,1);
  if(currentNoteTabIdx>=node.notes.length)currentNoteTabIdx=Math.max(0,node.notes.length-1);
  if(node.notes.length===0){closeNotePopup();snapshot();render();return;}
  rebuildNoteTabs(node);noteTA.value=node.notes[currentNoteTabIdx]?.text||'';snapshot();render();
}

function loadImgFile(file){

  const reader=new FileReader();
  reader.onload=e=>{
    pendingImgSrc=e.target.result;
    pendingImgEl=new Image();pendingImgEl.src=pendingImgSrc;
    imgDrop.innerHTML='<span class="icon">✅</span>'+file.name+'<br><small>準備完了</small>';
    document.getElementById('img-place').disabled=false;
  };
  reader.readAsDataURL(file);
}

  placeImage(pendingImgSrc,cx-size/2,cy-size/2,size);
  closeImgPopup();

function placeImage(src,x,y,w){
  const el=new Image();el.src=src;
  el.onload=()=>{
    const ratio=el.naturalHeight/el.naturalWidth;
    const h=w*ratio;
    images.push({id:++imgCounter,src,imgEl:el,x,y,w,h});
    snapshot();render();
  };
}

container.addEventListener('dragover',e=>{e.preventDefault();dropOverlay.classList.add('active');});

  e.preventDefault();dropOverlay.classList.remove('active');

  if(!file||!file.type.startsWith('image/'))return;
  const rect=canvas.getBoundingClientRect();
  const cx=(e.clientX-rect.left-panX)/zoom, cy=(e.clientY-rect.top-panY)/zoom;
  const reader=new FileReader();
  reader.onload=ev=>placeImage(ev.target.result,cx-80,cy-60,160);
  reader.readAsDataURL(file);
});

/* ════ Child placement ════ */
function childPos(parent){
  const count=nodes.filter(n=>n.parentId===parent.id).length;
  if(parent.isRoot){const angles=[0,Math.PI,-Math.PI/2,Math.PI/2,Math.PI/4,-Math.PI/4,3*Math.PI/4,-3*Math.PI/4];const a=angles[count%angles.length];return{x:parent.x+Math.cos(a)*200,y:parent.y+Math.sin(a)*200};}
  const gp=nodes.find(n=>n.id===parent.parentId);
  const a=gp?Math.atan2(parent.y-gp.y,parent.x-gp.x):0,pa=a+Math.PI/2;
  const sideAmt=count===0?0:Math.ceil(count/2)*52,side=count%2===0?1:-1;
  return{x:parent.x+Math.cos(a)*155+Math.cos(pa)*side*sideAmt,y:parent.y+Math.sin(a)*155+Math.sin(pa)*side*sideAmt};
}

/* ════ Add / delete ════ */
function addChild(){const par=nodes.find(n=>n.id===selId);if(!par)return;closeColorPopup();closeSizePopup();closeNotePopup();const pos=childPos(par),node=makeNode(pos.x,pos.y,'新しいノード',par.id);nodes.push(node);snapshot();selId=node.id;select(node.id);startEdit(node);}
function addRoot(){
  closeColorPopup();closeSizePopup();closeNotePopup();
  const rootCount=nodes.filter(n=>n.isRoot).length;
  const angle=(Math.PI*2/Math.max(1,rootCount+1))*rootCount;
  const cx=(canvas.width/2-panX)/zoom, cy=(canvas.height/2-panY)/zoom;
  const rx=rootCount===0?cx:cx+Math.cos(angle)*280, ry=rootCount===0?cy:cy+Math.sin(angle)*280;
  const node=makeNode(rx,ry,'テーマ '+(rootCount+1),null);node.isRoot=true;nodes.push(node);snapshot();select(node.id);startEdit(node);
}
function deleteSelected(){
  if(selImgId){images=images.filter(im=>im.id!==selImgId);selImgId=null;snapshot();updateButtons();render();return;}
  const s=nodes.find(n=>n.id===selId);if(!s||s.isRoot)return;
  // 直接の子ノードを親（祖父）に繋ぎ直す
  nodes.filter(n=>n.parentId===s.id).forEach(child=>{child.parentId=s.parentId;});
  nodes=nodes.filter(n=>n.id!==s.id);snapshot();select(null);
}

function deleteSubtree(){
  if(selImgId){deleteSelected();return;}
  const s=nodes.find(n=>n.id===selId);if(!s||s.isRoot)return;
  const del=new Set();(function collect(id){del.add(id);nodes.filter(n=>n.parentId===id).forEach(c=>collect(c.id));})(s.id);
  nodes=nodes.filter(n=>!del.has(n.id));snapshot();select(null);
}
function insertNodeOnEdge(fromNode,toNode){
  closeEdgeMenu();
  const mx=(fromNode.x+toNode.x)/2,my=(fromNode.y+toNode.y)/2;
  const newNode=makeNode(mx+30,my-40,'新しいノード',fromNode.id);
  toNode.parentId=newNode.id;newNode.branchColor=toNode.branchColor;nodes.push(newNode);snapshot();select(newNode.id);startEdit(newNode);
}
function closeEdgeMenu(){edgeMenu.style.display='none';pendingEdge=null;}
document.getElementById('edge-insert').addEventListener('click',()=>{if(pendingEdge)insertNodeOnEdge(pendingEdge.from,pendingEdge.to);});

/* ════ Text editing ════ */
function startEdit(node){
  if(!node)return;closeColorPopup();closeSizePopup();closeNotePopup();
  editId=node.id;
  const{w,h}=nodeSize(node),sc=c2s(node.x,node.y);
  const sw=w*zoom,sh=h*zoom;
  overlay.style.display='block';overlay.style.left=(sc.x-sw/2)+'px';overlay.style.top=(sc.y-sh/2)+'px';overlay.style.width=sw+'px';
  editInput.style.height=sh+'px';editInput.style.lineHeight=sh+'px';
  editInput.style.fontSize=Math.max(9,(node.isRoot?15:13)*((node.scale||100)/100)*zoom)+'px';
  editInput.value=node.text;
  requestAnimationFrame(()=>{editInput.focus();editInput.select();});
}
function finishEdit(){
  if(editId==null)return;
  const node=nodes.find(n=>n.id===editId);
  if(node){const v=editInput.value.trim();if(v)node.text=v;}
  editId=null;overlay.style.display='none';snapshot();render();
}
function cancelEdit(){editId=null;overlay.style.display='none';render();}

/* ════ JSON save / load ════ */
function saveJSON(){
  closeColorPopup();closeSizePopup();closeNotePopup();
  const data={
    version:3,
    nodes:nodes.map(n=>({...n})),
    images:images.map(im=>({id:im.id,src:im.src,x:im.x,y:im.y,w:im.w,h:im.h})),
    counter,noteCounter,imgCounter,
    viewport:{zoom,panX,panY}
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='mindmap_'+new Date().toISOString().slice(0,10)+'.json';a.click();
  showToast('💾 保存しました');
}
function loadJSONFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      nodes=data.nodes||[];
      counter=data.counter||0;noteCounter=data.noteCounter||0;imgCounter=data.imgCounter||0;
      if(data.viewport){zoom=data.viewport.zoom;panX=data.viewport.panX;panY=data.viewport.panY;zoomBtn.textContent=Math.round(zoom*100)+'%';}
      // restore images
      images=(data.images||[]).map(im=>{const el=new Image();el.src=im.src;return{...im,imgEl:el};});
      selId=null;selImgId=null;
      snapshot();updateButtons();render();
      showToast('📂 読み込みました');
    }catch(err){showToast('⚠️ 読み込み失敗: 無効なファイル');}
  };
  reader.readAsText(file);
}
document.getElementById('btn-save-json').addEventListener('click',saveJSON);
document.getElementById('btn-load-json').addEventListener('click',()=>document.getElementById('json-file-input').click());
document.getElementById('json-file-input').addEventListener('change',e=>{if(e.target.files[0])loadJSONFile(e.target.files[0]);e.target.value='';});

/* ════ Init ════ */
function init(){
  nodes=[];images=[];selId=null;selImgId=null;counter=0;noteCounter=0;imgCounter=0;zoom=1;panX=0;panY=0;
  zoomBtn.textContent='100%';history=[];histIdx=-1;
  closeColorPopup();closeSizePopup();closeNotePopup();closeEdgeMenu();
  const root=makeNode(canvas.width/2,canvas.height/2,'メインテーマ',null);root.isRoot=true;nodes.push(root);
  snapshot();select(null);
}
function resize(){canvas.width=container.clientWidth;canvas.height=container.clientHeight;render();}

/* ════ Mouse ════ */
canvas.addEventListener('mousedown',e=>{
  if(e.button===2)return;
  closeEdgeMenu();
  if(editId!=null)finishEdit();
  closeColorPopup();closeSizePopup();
  const rect=canvas.getBoundingClientRect();
  const sx=e.clientX-rect.left,sy=e.clientY-rect.top;
  const{x,y}=s2c(sx,sy);

  // 1. bubble drag handle
  const hh=bubbleHandleAt(x,y);
  if(hh){dragBubbleNode=hh.node;dragBubbleNoteId=hh.noteId;canvas.classList.add('dragging');return;}

  // 2. bubble click
  const bHit=bubbleAt(x,y);if(bHit){select(bHit.node.id);return;}

  // 3. image resize handle (only if selected)
  if(selImgId){const im=images.find(i=>i.id===selImgId);if(im&&imageResizeHandle(im,x,y)){resizeImg=im;resizeImgStart={x,y,w:im.w,h:im.h,ratio:im.h/im.w};canvas.classList.add('dragging');return;}}

  // 4. node
  const node=nodeAt(x,y);
  if(node){select(node.id);dragNode=node;dragOff={x:x-node.x,y:y-node.y};canvas.classList.add('dragging');return;}

  // 5. image
  const im=imageAt(x,y);
  if(im){selectImg(im.id);dragImg=im;dragImgOff={x:x-im.x,y:y-im.y};canvas.classList.add('dragging');return;}

  // 6. edge
  const edge=edgeAt(x,y,10/zoom);
  if(edge){pendingEdge=edge;edgeMenu.style.left=(e.clientX+4)+'px';edgeMenu.style.top=(e.clientY+4)+'px';edgeMenu.style.display='block';return;}

  // 7. pan
  select(null);panning=true;panStart={x:sx-panX,y:sy-panY};canvas.classList.add('panning');
});

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const sx=e.clientX-rect.left,sy=e.clientY-rect.top;
  const{x,y}=s2c(sx,sy);

  if(dragBubbleNode){const dx=x-dragBubbleNode.x,dy=y-dragBubbleNode.y;saveNoteOffset(dragBubbleNode,dragBubbleNoteId,Math.atan2(dy,dx),Math.max(30,Math.hypot(dx,dy)));render();return;}
  if(resizeImg){const dx=x-resizeImgStart.x;const nw=Math.max(30,resizeImgStart.w+dx);resizeImg.w=nw;resizeImg.h=nw*resizeImgStart.ratio;render();return;}
  if(dragNode){dragNode.x=x-dragOff.x;dragNode.y=y-dragOff.y;render();return;}
  if(dragImg){dragImg.x=x-dragImgOff.x;dragImg.y=y-dragImgOff.y;render();return;}
  if(panning){panX=sx-panStart.x;panY=sy-panStart.y;render();return;}

  // hover
  const edge=edgeAt(x,y,10/zoom);
  const prev=hoveredEdge;hoveredEdge=edge;
  if((prev==null)!==(edge==null)||(prev&&edge&&(prev.from.id!==edge.from.id||prev.to.id!==edge.to.id)))render();

  // cursor
  if(bubbleHandleAt(x,y)) canvas.style.cursor='grab';
  else if(selImgId){const im=images.find(i=>i.id===selImgId);if(im&&imageResizeHandle(im,x,y)){canvas.style.cursor='se-resize';return;}}
  if(nodeAt(x,y)||bubbleAt(x,y)) canvas.style.cursor='pointer';
  else if(imageAt(x,y)) canvas.style.cursor='move';
  else if(edge) canvas.style.cursor='cell';
  else canvas.style.cursor='default';
});

function onMouseUp(){
  const wasDragNode=dragNode, wasResizeImg=resizeImg, wasDragImg=dragImg, wasDragBubble=dragBubbleNode;
  dragNode=null;dragBubbleNode=null;dragBubbleNoteId=null;resizeImg=null;dragImg=null;panning=false;
  canvas.classList.remove('dragging','panning');
  if(wasDragNode||wasResizeImg||wasDragImg||wasDragBubble) snapshot();
}
canvas.addEventListener('mouseup',onMouseUp);
canvas.addEventListener('mouseleave',()=>{dragNode=null;dragBubbleNode=null;dragBubbleNoteId=null;resizeImg=null;dragImg=null;panning=false;hoveredEdge=null;canvas.classList.remove('dragging','panning');render();});

canvas.addEventListener('dblclick',e=>{
  const rect=canvas.getBoundingClientRect();
  const{x,y}=s2c(e.clientX-rect.left,e.clientY-rect.top);
  const bHit=bubbleAt(x,y);
  if(bHit){select(bHit.node.id);currentNoteTabIdx=(bHit.node.notes||[]).findIndex(n=>n.id===bHit.noteId)||0;openNotePopup();return;}
  const node=nodeAt(x,y);if(node){select(node.id);startEdit(node);}
});

canvas.addEventListener('wheel',e=>{e.preventDefault();const rect=canvas.getBoundingClientRect();setZoom(zoom*(e.deltaY<0?1.12:1/1.12),e.clientX-rect.left,e.clientY-rect.top);},{passive:false});

document.addEventListener('mousedown',e=>{
  if(colorPopupOpen&&!colorPopup.contains(e.target)&&e.target.id!=='btn-color')closeColorPopup();
  if(sizePopupOpen&&!sizePopup.contains(e.target)&&e.target.id!=='btn-size')closeSizePopup();
  if(notePopupOpen&&!notePopup.contains(e.target)&&e.target.id!=='btn-note')closeNotePopup();
  if(imgPopupOpen&&!imgPopup.contains(e.target)&&e.target.id!=='btn-img')closeImgPopup();
  if(edgeMenu.style.display==='block'&&!edgeMenu.contains(e.target))closeEdgeMenu();
},true);

/* ════ Keyboard ════ */
document.addEventListener('keydown',e=>{
  if(editId!=null)return;
  if(notePopupOpen){
    if(e.key==='Escape'){closeNotePopup();e.stopPropagation();}
    if(e.key==='Enter'&&(e.ctrlKey||e.metaKey))saveNote();
    return;
  }
  // undo/redo
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();return;}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo();return;}
  // save
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveJSON();return;}
  if(e.key==='Tab'){e.preventDefault();addChild();return;}
  if(e.key==='Escape'){select(null);closeEdgeMenu();return;}
  if(e.key==='Delete'||e.key==='Backspace'){const s=nodes.find(n=>n.id===selId);if((s&&!s.isRoot)||selImgId){if(e.shiftKey)deleteSubtree();else deleteSelected();}}
  if(e.key==='Enter'||e.key==='F2'){const s=nodes.find(n=>n.id===selId);if(s)startEdit(s);}
  if((e.ctrlKey||e.metaKey)&&(e.key==='+'||e.key==='=')){e.preventDefault();setZoom(zoom*1.2);}
  if((e.ctrlKey||e.metaKey)&&e.key==='-'){e.preventDefault();setZoom(zoom/1.2);}
  if((e.ctrlKey||e.metaKey)&&e.key==='0'){e.preventDefault();resetZoom();}
});

editInput.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();finishEdit();}if(e.key==='Escape')cancelEdit();e.stopPropagation();});
editInput.addEventListener('blur',()=>setTimeout(finishEdit,120));
colorCustom.addEventListener('input',()=>changeNodeColor(colorCustom.value));
colorCustom.addEventListener('change',()=>closeColorPopup());
noteTA.addEventListener('keydown',e=>{if(e.key==='Escape'){closeNotePopup();e.stopPropagation();}if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){saveNote();e.stopPropagation();}});

/* ════ Toolbar ════ */
document.getElementById('btn-undo').addEventListener('click',undo);
document.getElementById('btn-redo').addEventListener('click',redo);
document.getElementById('btn-add').addEventListener('click',addChild);
document.getElementById('btn-add-root').addEventListener('click',addRoot);
document.getElementById('btn-edit').addEventListener('click',()=>{const s=nodes.find(n=>n.id===selId);if(s)startEdit(s);});
document.getElementById('btn-color').addEventListener('click',toggleColorPopup);
document.getElementById('btn-size').addEventListener('click',toggleSizePopup);
document.getElementById('btn-note').addEventListener('click',toggleNotePopup);
document.getElementById('btn-img').addEventListener('click',()=>{const s=nodes.find(n=>n.id===selId);if(s)openImgPopup();});
document.getElementById('btn-delete').addEventListener('click',e=>{if(e.shiftKey)deleteSubtree();else deleteSelected();});
document.getElementById('btn-reset').addEventListener('click',()=>{if(confirm('マインドマップをリセットしますか？'))init();});
document.getElementById('btn-theme').addEventListener('click',()=>{darkMode=!darkMode;applyTheme();});
document.getElementById('btn-zoom-in').addEventListener('click',()=>setZoom(zoom*1.2));
document.getElementById('btn-zoom-out').addEventListener('click',()=>setZoom(zoom/1.2));
document.getElementById('btn-zoom-reset').addEventListener('click',resetZoom);
document.getElementById('note-save').addEventListener('click',saveNote);
document.getElementById('note-delete-tab').addEventListener('click',deleteCurrentNoteTab);
document.getElementById('note-cancel').addEventListener('click',closeNotePopup);
document.getElementById('btn-export').addEventListener('click',()=>{
  closeColorPopup();closeSizePopup();closeNotePopup();select(null);
  requestAnimationFrame(()=>{const a=document.createElement('a');a.download='mindmap_'+new Date().toISOString().slice(0,10)+'.png';a.href=canvas.toDataURL('image/png');a.click();showToast('🖼 PNG出力しました');});
});

/* ════ Boot ════ */
window.addEventListener('resize',resize);
resize();init();applyTheme();
})();
</script>
</body>
</html>
